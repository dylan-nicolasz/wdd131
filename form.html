<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page, product review</title>
    <meta name="author" content="Dylan Zurita">
    <meta name="description" content="Learn about forms and different tags and elements that are useful to create forms in web pages.">
    <script src="scripts/form.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-mobile.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        
        <form action="review.html" method="get">
            <fieldset>
                <label for="prodmenu">Product Name</label>
                <select name="productmenu" id="prodmenu" required>
                    <option value="" disabled selected>Select a Product</option>
                </select>
            </fieldset>

            <fieldset>
                <label>Overall Rating</label>
                <div class="stars">
	                <input type="radio" id="fivestar" name="stars" value="5" required><label for="fivestar">☆☆☆☆☆</label>
	                <input type="radio" id="fourstar" name="stars" value="4" required><label for="fourstar">☆☆☆☆</label>
	                <input type="radio" id="threestar" name="stars" value="3" required><label for="threestar">☆☆☆</label>
	                <input type="radio" id="twostar" name="stars" value="2" required><label for="twostar">☆☆</label>
	                <input type="radio" id="onestar" name="stars" value="1" required><label for="onestar">☆</label>
                </div>
            </fieldset>

            <fieldset>
                <label for="date">Date of Installation</label>
                <input type="date" id="date" name="setdate" required>
            </fieldset> 

            <fieldset>
                <legend>Which features did you find useful in the product?<span class="optional-text">(Check all that apply)</span></legend>
                    <label for="durab"><input type="checkbox" name="durability" id="durab" value="yes">Durability</label>   
                    <label for="easeuse"><input type="checkbox" name="easeofuse" id="easeuse" value="yes">Ease of Use</label>
                    <label for="perf"><input type="checkbox" name="performance" id="perf" value="yes">Performance</label>
                    <label for="design"><input type="checkbox" name="design" id="design" value="yes">Design</label>     
            </fieldset>

            <fieldset>
                <label for="review">Written Review (Optional)</label>
                <textarea name="review" id="review"></textarea>
            </fieldset>

            <fieldset>
                <label for="name">Your name (Optional)</label>
                <input type="text" name="name" id="name">
            </fieldset>

            <div class="submit">
                <input type="submit" name="postreview" id="post" value="Post Review">
            </div>
        </form>
    </main>    
    <footer>
        <p>
        &copy; <span id="year"></span> Dylan Zurita, Quito-Ecuador</p>
        <p id="last-modified"></p>
    </footer>
</body>
</html>
