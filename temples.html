<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Dylan Zurita">
    <meta name="description" content="Web page of a photo album about temples"> 
    <title>WDD 131 – Dynamic Web Fundamentals – Dylan Zurita</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <a id="menu" href="#"></a>
        <nav>
            <ul class="navigation">
                <li> <a href="#" title="Home">Home</a></li>
                <li> <a href="#" title="Old">Old</a></li>
                <li> <a href="#" title="New">New</a></li>
                <li> <a href="#" title="Large">Large</a></li>
                <li> <a href="#" title="Small ">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Home</h1>
        <section class="gallery">
            <figure>
                <img src="images/barranquilla_columbia_temple_exterior.webp" alt="Barranquilla temple">
                <figcaption>Barranquilla, Colombia</figcaption>
            </figure>
            <figure>
                <img src="images/bogota_colombia_temple_lds.webp" alt="Bogota temple">
                <figcaption>Bogota, Colombia</figcaption>
            </figure>
            <figure>
                <img src="images/columbia_temple_lds.webp" alt="Columbia, South Carolina temple">
                <figcaption>Columbia, South Carolina</figcaption>
            </figure>
            <figure>
                <img src="images/montreal_quebec_temple_lds.webp" alt="Montreal temple">
                <figcaption>Montreal, Canada</figcaption>
            </figure>
            <figure>
                <img src="images/recife_brazil_temple_lds.webp" alt="Recife temple">
                <figcaption>Recife, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/rio_de_janeiro_brazil_temple.webp" alt="Rio de Janeiro temple" loading="lazy">
                <figcaption>Rio de Janeiro, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/rome_italy_temple.webp" alt="Rome temple" loading="lazy">
                <figcaption>Rome, Italy</figcaption>
            </figure>
            <figure>
                <img src="images/santo_domingo_dominican_republic_temple_lds.webp" alt="Santo Domingo temple" loading="lazy">
                <figcaption>Santo Domingo, Republica Dominicana</figcaption>
            </figure>
            <figure>
                <img src="images/temple_rendering_birmingham_england_temple.webp" alt="Birmingham temple"loading="lazy">
                <figcaption>Birmingham, England</figcaption>
            </figure>
        </section> 
    </main>
    <footer>
         <p>
        &copy; <span id="year"></span> Dylan Zurita, Quito-Ecuador</p>
        <p id="last-modified"></p>
    </footer>
</body>
</html>
