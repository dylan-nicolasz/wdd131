<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page, Login Profbook</title>
    <meta name="author" content="Dylan Zurita">
    <meta name="description" content="Form page, login info for users entering profbook. Users will provide their names, email, reason">
    <script src="scripts/" defer></script>
    <link rel="stylesheet" href="styles/">
    <link rel="stylesheet" href="styles/">
</head>
<body>
    <header>
        <h1>Login into Profbook</h1>
    </header>
    <main>
       
        <form action="review.html" method="get">

            <fieldset>
                <label for="name">Your full name</label>
                <input type="text" name="name" id="name">
            </fieldset>

            <fieldset>
                <label for="email">Your email</label>
                <input type="text" name="email" id="email">
            </fieldset>

            <fieldset>
                <label for="prodmenu">Product Name</label>
                <select name="productmenu" id="prodmenu" required>
                    <option value="" disabled selected>Select a Product</option>
                </select>
            </fieldset>

            <fieldset>
                <label></label>
                <div class="stars">
	                <input type="radio" id="hiring" name="reason" value="hiring" required><label for="fivestar">Hiring</label>
	                <input type="radio" id="applying" name="reason" value="applying" required><label for="fourstar">Applying</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Which features did you find useful in the product?<span class="optional-text">(Check all that apply)</span></legend>
                    <label for="durab"><input type="checkbox" name="durability" id="durab" value="yes">Durability</label>   
                    <label for="easeuse"><input type="checkbox" name="easeofuse" id="easeuse" value="yes">Ease of Use</label>
                    <label for="perf"><input type="checkbox" name="performance" id="perf" value="yes">Performance</label>
                    <label for="design"><input type="checkbox" name="design" id="design" value="yes">Design</label>     
            </fieldset>

            <div class="submit">
                <input type="submit" name="postreview" id="post" value="Post Review">
            </div>
        </form>
    </main>    
    <footer>
        <p>
        &copy; <span id="year"></span> Dylan Zurita, Quito-Ecuador</p>
        <p id="last-modified"></p>
    </footer>
</body>
</html>
